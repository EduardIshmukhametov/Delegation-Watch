services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    env_file: .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  indexer:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        APP: indexer
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      CHAIN: monad
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  mysql_data:
